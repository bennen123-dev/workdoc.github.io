  <script>
    // 🔑 שנה כאן את הסיסמה שלך בעתיד (החלף את ה-1234 במה שתרצה, אך שמור על הגרשיים)
    const SECRET_PASSWORD = "221170";

    // מנגנון נעילת דף מאובטח
    (function() {
      let authenticated = false;
      while (!authenticated) {
        const userInput = prompt("מערכת הצעות מחיר חסומה.\nאנא הכנס סיסמה כדי להיכנס:");
        if (userInput === null) {
          document.write("<body style='font-family:Arial; text-align:center; padding-top:100px; background:#f3f4f6;'><h2>הגישה נדחתה. הדף חסום.</h2></body>");
          window.stop();
          break;
        } else if (userInput === SECRET_PASSWORD) {
          authenticated = true;
        } else {
          alert("סיסמה שגויה! נסה שנית.");
        }
      }
    })();

    // 🖨️ פונקציית קסם להדפסה נקייה באייפון ובמחשב - ללא כותרות וקישורי דפדפן
    function printCleanDocument() {
      const previewContent = document.getElementById('preview').innerHTML;
      const printWindow = window.open('', '_blank');
      
      printWindow.document.write(`
        <!DOCTYPE html>
        <html lang="he" dir="rtl">

          <title>הצעת מחיר</title>

            }
            html, body {
              margin: 0;
              padding: 0;
              -webkit-print-color-adjust: exact;
              print-color-adjust: exact;
            }
            body {
              font-family: Arial, sans-serif;
              direction: rtl;
              background: #fff;
              padding: 25mm 20mm 25mm 20mm; /* השוליים האמיתיים של המסמך מוגדרים פה */
              box-sizing: border-box;
              color: #000;
              font-size: 14px;
              line-height: 1.5;
            }
            .doc-content { width: 100%; }
            .logo-box { text-align: center; margin-bottom: 15px; padding-top: 5px; width: 100%; }
            .company-logo { max-height: 75px; width: auto; display: inline-block; }
            .logo-subtitle { font-family: Arial, Helvetica, sans-serif; font-weight: bold; font-size: 13px; color: #222; letter-spacing: 0.5px; margin-top: 6px; }
            .doc-divider { height: 1.5px; background-color: #000; margin: 12px 0 20px 0; width: 100%; }
            .customer-info-box { display: flex; justify-content: space-between; margin-bottom: 20px; }
            .info-right { text-align: right; width: 50%; }
            .info-left { text-align: left; width: 50%; }
            .info-row { margin-bottom: 4px; }
            .doc-subject { font-size: 15px; font-weight: bold; margin: 20px 0; text-align: center; text-decoration: underline; }
            .section-title { font-size: 14.5px; font-weight: bold; color: #000; margin-top: 18px; margin-bottom: 6px; text-decoration: underline; }
            .doc-text { margin-bottom: 10px; white-space: pre-line; text-align: justify; }
            .item-row { margin-bottom: 5px; padding-right: 5px; text-align: justify; }
            .note-row { font-weight: bold; margin: 8px 0; padding-right: 15px; }
            .price-line { margin-bottom: 4px; font-weight: bold; }
            .closing-signature { margin-top: 35px; margin-bottom: 40px; text-align: right; }
            .footer-normal { 
              text-align: center; 
              border-top: 1px solid #000;
              padding-top: 12px;
              margin-top: 50px; 
              font-size: 13px;
              line-height: 1.4;
              width: 100%;
            }
            .footer-phones { font-weight: bold; }
            .footer-email { font-family: Arial, sans-serif; font-weight: bold; margin-top: 2px; color: #000; }
            .certification-text { font-size: 12.5px; color: #333; margin-top: 8px; text-align: justify; }
          </style>
        </head>
        <body>
          ${previewContent}
          <script>
            window.onload = function() {
              window.print();
              setTimeout(function() { window.close(); }, 500);
            };
          <\/script>
        </body>
        </html>
      `);
      printWindow.document.close();
    }
  </script>

  <style>
    /* עיצוב כללי למסך העבודה */
    body { font-family: Arial, sans-serif; background:#f3f4f6; margin:0; padding:16px; color:#222; }

    .card { background:#fff; border-radius:14px; padding:20px; box-shadow:0 4px 14px rgba(0,0,0,.08); box-sizing: border-box; }

    textarea { min-height:80px; resize:vertical; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 16px; }
    button { border:none; border-radius:9px; padding:12px 14px; font-size:14px; cursor:pointer; margin-top:10px; font-weight: bold; font-family: Arial, sans-serif; }

    .tab-btn.active { background:#111827; color:white; }
    .section-bank { border:1px solid #e5e7eb; border-radius:10px; padding:12px; background:#fafafa; max-height: 250px; overflow-y: auto; display: none; }
    .section-bank.active { display:block; }
    .bank-item { display:grid; grid-template-columns:auto 1fr auto; gap:10px; background:#fff; padding:12px; border-radius:8px; border:1px solid #e5e7eb; margin-bottom:8px; line-height:1.45; cursor:pointer; align-items: center; }
    .bank-item input { width:auto; margin:0; }
    .btn-delete-bank { background: none; color: #ef4444; padding: 2px 6px; font-size: 14px; margin: 0; }

    .selected-list { margin-top:16px; border:1px solid #ddd; border-radius:10px; overflow:hidden; }
    .selected-item { background:#f8fafc; padding:14px; border-bottom:1px solid #e5e7eb; font-size: 14px; }

    .selected-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .price-item { background:#f8fafc; border:1px solid #ddd; border-radius:10px; padding:14px; margin-top:12px; }
      
    .btn-add { background:#e8eef7; color: #1e40af; width: 100%; padding: 14px; border: 1px dashed #1e40af; border-radius: 9px; }
    .btn-main { background:#059669; color:white; width:100%; font-weight:bold; font-size:18px; padding:16px; margin-top: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .btn-main:hover { background:#047857; }
    .btn-email { background:#2563eb; color:white; width:100%; font-weight:bold; font-size:16px; padding:14px; margin-top: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .btn-email:hover { background:#1d4ed8; }
    .btn-remove { background:#fee2e2; color:#991b1b; }
    .btn-note { background:#fff3cd; color: #92400e; }
    .btn-small { background:#eef2ff; color: #3730a3; padding: 8px 12px; font-size: 13px; }

    .warranty-fields.active { display: block; }

    .certification-text { font-size: 12.5px; color: #333; margin-top: 8px; text-align: justify; }

    /* עיצוב אזור הוספת סעיף מותאם לבנק */

    .custom-bank-input-group button:hover { background: #1d4ed8; }

    /* =================================================== */
    /* עיצוב הנייר הרשמי והתצוגה המקדימה                   */

    .preview-card { position: sticky; top: 16px; }

    /* קופסת תוכן המסמך */

    /* קופסת לוגו ממורכזת */
    .logo-box { text-align: center; margin-bottom: 15px; padding-top: 5px; width: 100%; }

    .customer-info-box { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .info-right { text-align: right; }
    .info-left { text-align: left; }
    .info-row { margin-bottom: 4px; }
      
    /* הנדון ממורכז */
    .doc-subject { font-size: 15px; font-weight: bold; margin: 20px 0; text-align: center; text-decoration: underline; }
      
    /* כותרות סעיפים */
    .section-title { font-size: 14.5px; font-weight: bold; color: #000; margin-top: 18px; margin-bottom: 6px; text-decoration: underline; }
      
    .doc-text { margin-bottom: 10px; white-space: pre-line; text-align: justify; }
    .item-row { margin-bottom: 5px; padding-right: 5px; text-align: justify; }
    .note-row { font-weight: bold; margin: 8px 0; padding-right: 15px; }
    .price-line { margin-bottom: 4px; font-weight: bold; }
      
    /* אזור חתימה */
    .closing-signature { margin-top: 35px; margin-bottom: 40px; text-align: right; }
      
    /* כותרת תחתית (Footer) כטקסט רגיל ויציב בתחתית העמוד הלבן */
    .footer-normal { 
      text-align: center; 
      border-top: 1px solid #000;
      padding-top: 12px;
      margin-top: auto; 
      font-size: 13px;
      line-height: 1.4;
      width: 100%;
    }
    .footer-phones { font-weight: bold; }
    .footer-email { font-family: Arial, sans-serif; font-weight: bold; margin-top: 2px; color: #000; }

    /* התאמה מיוחדת למסכי טלפונים ניידים וטאבלטים */
    @media (max-width: 950px) { 
      body { padding: 8px; }
      .container { grid-template-columns: 1fr; gap: 16px; } 
      .preview-card { position: static; } 
      .preview-paper { padding: 25px 20px 30px 20px; min-height: auto; }
      .row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
