<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת הצעות מחיר - י.שם-טוב</title>
  <style>
    /* עיצוב כללי למסך העבודה */
    body { font-family: Arial, sans-serif; background:#f3f4f6; margin:0; padding:16px; color:#222; }
    .container { max-width:1300px; margin:auto; display:grid; grid-template-columns: 1.1fr 0.9fr; gap:24px; }
    .card { background:#fff; border-radius:14px; padding:20px; box-shadow:0 4px 14px rgba(0,0,0,.08); box-sizing: border-box; }
    h1, h2, h3 { margin-top:0; color: #111827; }
    label { display:block; margin-top:14px; font-weight:bold; font-size: 14px; }
    input, select, textarea { width:100%; padding:12px; margin-top:6px; border:1px solid #cfcfcf; border-radius:8px; font-size:15px; box-sizing:border-box; font-family: Arial, sans-serif; }
    textarea { min-height:80px; resize:vertical; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 16px; }
    button { border:none; border-radius:9px; padding:12px 14px; font-size:14px; cursor:pointer; margin-top:10px; font-weight: bold; font-family: Arial, sans-serif; }
    .tab-btn { background:#e8eef7; margin-top:0; color: #1e40af; flex: 1 1 auto; text-align: center; }
    .tab-btn.active { background:#111827; color:white; }
    .section-bank { border:1px solid #e5e7eb; border-radius:10px; padding:12px; background:#fafafa; max-height: 250px; overflow-y: auto; display: none; }
    .section-bank.active { display:block; }
    .bank-item { display:grid; grid-template-columns:auto 1fr auto; gap:10px; background:#fff; padding:12px; border-radius:8px; border:1px solid #e5e7eb; margin-bottom:8px; line-height:1.45; cursor:pointer; align-items: center; }
    .bank-item input { width:auto; margin:0; }
    .btn-delete-bank { background: none; color: #ef4444; padding: 2px 6px; font-size: 14px; margin: 0; }
    .btn-delete-bank:hover { color: #b91c1c; }
    .selected-list { margin-top:16px; border:1px solid #ddd; border-radius:10px; overflow:hidden; }
    .selected-item { background:#f8fafc; padding:14px; border-bottom:1px solid #e5e7eb; font-size: 14px; }
    .selected-item:last-child { border-bottom:none; }
    .selected-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .price-item { background:#f8fafc; border:1px solid #ddd; border-radius:10px; padding:14px; margin-top:12px; }
    
    .btn-add { background:#e8eef7; color: #1e40af; width: 100%; padding: 14px; border: 1px dashed #1e40af; border-radius: 9px; }
    .btn-main { background:#059669; color:white; width:100%; font-weight:bold; font-size:18px; padding:16px; margin-top: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .btn-main:hover { background:#047857; }
    .btn-remove { background:#fee2e2; color:#991b1b; }
    .btn-note { background:#fff3cd; color: #92400e; }
    .btn-small { background:#eef2ff; color: #3730a3; padding: 8px 12px; font-size: 13px; }

    /* עיצוב תיבת הסימון של האחריות */
    .checkbox-container { display: flex; align-items: center; gap: 10px; margin-top: 14px; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .checkbox-container input { width: auto; margin: 0; cursor: pointer; transform: scale(1.2); }
    .checkbox-container label { margin: 0; cursor: pointer; }
    .warranty-fields { display: none; background: #f8fafc; padding: 14px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 8px; }
    .warranty-fields.active { display: block; }
    
    /* עיצוב טקסט קטן להסמכה */
    .certification-text { font-size: 12.5px; color: #333; margin-top: 8px; text-align: justify; }

    /* עיצוב אזור הוספת סעיף מותאם לבנק */
    .custom-bank-input-group { display: flex; gap: 8px; margin-top: 8px; margin-bottom: 12px; }
    .custom-bank-input-group input { margin-top: 0; flex: 1; }
    .custom-bank-input-group button { margin-top: 0; background: #1e40af; color: white; border-radius: 8px; padding: 0 16px; }
    .custom-bank-input-group button:hover { background: #1d4ed8; }

    /* =================================================== */
    /* עיצוב הנייר הרשמי והתצוגה המקדימה                   */
    /* =================================================== */
    .preview-card { position: sticky; top: 16px; }
    .preview-paper { 
      direction: rtl; 
      background: #fff; 
      min-height: 842px; 
      padding: 30px 45px 40px 45px; 
      box-sizing: border-box; 
      color: #000; 
      font-size: 14px; 
      line-height: 1.5;
      position: relative; 
      display: flex;
      flex-direction: column;
    }
    
    /* קופסת תוכן המסמך */
    .doc-content { flex: 1; }
    
    /* קופסת לוגו טקסטואלית ממורכזת */
    .logo-box { text-align: center; margin-bottom: 15px; padding-top: 10px; width: 100%; }
    .logo-title { font-family: Arial, Helvetica, sans-serif; font-weight: 900; font-size: 32px; letter-spacing: -0.5px; color: #000; margin: 0; }
    .logo-subtitle { font-family: Arial, Helvetica, sans-serif; font-weight: bold; font-size: 13px; color: #222; letter-spacing: 0.5px; margin-top: 4px; }
    
    .doc-divider { height: 1.5px; background-color: #000; margin: 12px 0 20px 0; width: 100%; }
    
    /* קוביית פרטי הלקוח והתאריכים */
    .customer-info-box { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .info-right { text-align: right; }
    .info-left { text-align: left; }
    .info-row { margin-bottom: 4px; }
    
    /* הנדון ממורכז */
    .doc-subject { font-size: 15px; font-weight: bold; margin: 20px 0; text-align: center; text-decoration: underline; }
    
    /* כותרות סעיפים */
    .section-title { font-size: 14.5px; font-weight: bold; color: #000; margin-top: 18px; margin-bottom: 6px; text-decoration: underline; }
    
    .doc-text { margin-bottom: 10px; white-space: pre-line; text-align: justify; }
    .item-row { margin-bottom: 5px; padding-right: 5px; text-align: justify; }
    .note-row { font-weight: bold; margin: 8px 0; padding-right: 15px; }
    .price-line { margin-bottom: 4px; font-weight: bold; }
    
    /* אזור חתימה */
    .closing-signature { margin-top: 35px; margin-bottom: 40px; text-align: right; }
    
    /* כותרת תחתית (Footer) כטקסט רגיל ויציב בתחתית העמוד הלבן */
    .footer-normal { 
      text-align: center; 
      border-top: 1px solid #000;
      padding-top: 12px;
      margin-top: auto; 
      font-size: 13px;
      line-height: 1.4;
      width: 100%;
    }
    .footer-phones { font-weight: bold; }
    .footer-email { font-family: Arial, sans-serif; font-weight: bold; margin-top: 2px; color: #000; }

    /* התאמה מיוחדת למסכי טלפונים ניידים וטאבלטים */
    @media (max-width: 950px) { 
      body { padding: 8px; }
      .container { grid-template-columns: 1fr; gap: 16px; } 
      .preview-card { position: static; } 
      .preview-paper { padding: 25px 20px 30px 20px; min-height: auto; }
      .row { grid-template-columns: 1fr; gap: 0; }
    }

    /* =================================================== */
    /* חוקי קסם מוחלטים להדפסה ושמירה נקייה ל-PDF          */
    /* =================================================== */
    @media print {
      @page { size: A4; margin: 12mm 15mm 15mm 15mm; }
      body { background: #fff; padding: 0; margin: 0; }
      .card:not(.preview-card), h2:not(.print-visible), form, .tabs, button, .no-print { display: none !important; }
      .container { display: block; margin: 0; padding: 0; }
      .card.preview-card { box-shadow: none; padding: 0; border: none; background: transparent; }
      .preview-paper { border: none; padding: 0; min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2 style="border-bottom: 2px solid #111827; padding-bottom: 8px;">מערכת הצעות מחיר רשמיות</h2>

      <form id="quoteForm" onsubmit="event.preventDefault(); window.print();">
        <div class="row">
          <div>
            <label>תאריך לועזי</label>
            <input type="date" id="date" required />
          </div>
          <div>
            <label>תאריך עברי</label>
            <input type="text" id="hebrewDate" placeholder="לדוגמה: ט\"ז/אב/תשפ\"ג" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>לכבוד</label>
            <input type="text" id="customer" placeholder="ועד בית" required />
          </div>
          <div>
            <label>רחוב / כתובת</label>
            <input type="text" id="address" placeholder="אדם 5 דירה 10" />
          </div>
        </div>

        <label>הנדון</label>
        <input type="text" id="subject" value="הצעת מחיר לאיטום גג" required />

        <label>משפט פתיחה</label>
        <textarea id="openingText">בהמשך לסיור שערכנו בשטח הגג, להלן הצעת מחיר הכוללת את שלבי הביצוע לאיטום גג.</textarea>

        <label>תיאור העבודה והמקום</label>
        <input type="text" id="workDescription" value="איטום גג." />

        <h3 style="margin-top: 25px; margin-bottom: 5px;">בנק סעיפי עבודה</h3>
        
        <label style="margin-top: 5px; color: #4b5563;">הוספת סעיף חדש לבנק (לטאב הנבחר):</label>
        <div class="custom-bank-input-group">
          <input type="text" id="customBankText" placeholder="הקלד כאן סעיף עבודה חדש שתרצה להוסיף לבנק..." />
          <button type="button" onclick="addNewItemToBank()">➕ הוסף לבנק</button>
        </div>

        <div class="tabs">
          <button type="button" class="tab-btn active" onclick="showBank('roof', this)">גג</button>
          <button type="button" class="tab-btn" onclick="showBank('balcony', this)">מרפסת</button>
          <button type="button" class="tab-btn" onclick="showBank('wall', this)">קיר</button>
          <button type="button" class="tab-btn" onclick="showBank('materials', this)">חומרים / איטום</button>
          <button type="button" class="tab-btn" onclick="showBank('general', this)">כללי</button>
        </div>

        <div id="roof" class="section-bank active"></div>
        <div id="balcony" class="section-bank"></div>
        <div id="wall" class="section-bank"></div>
        <div id="materials" class="section-bank"></div>
        <div id="general" class="section-bank"></div>

        <button type="button" class="btn-add" style="background:#eff6ff; color:#1e40af; font-weight:bold; margin-bottom: 20px;" onclick="addCheckedBankItems()">➕ הוסף את הסעיפים המסומנים למפרט למטה</button>

        <h3>מפרט הפעולות שנבחרו להצעה:</h3>
        <div id="selectedItems" class="selected-list"></div>

        <h3 style="margin-top: 25px;">תמחור העבודה</h3>
        <div id="pricesContainer"></div>
        <button type="button" class="btn-add" style="background:#f0fdf4; color:#166534; border-color:#166534;" onclick="addPriceItem()">➕ הוסף שורת מחיר חדשה</button>

        <label>נוסח מע״מ</label>
        <select id="vatText">
          <option value="המחירים אינם כוללים מע״מ.">המחירים אינם כוללים מע״מ.</option>
          <option value="המחירים כוללים מע״מ.">המחירים כוללים מע״מ.</option>
          <option value="">ללא שורת מע״מ</option>
        </select>

        <h3>תקופת אחריות והערות</h3>
        
        <div class="checkbox-container">
          <input type="checkbox" id="includeWarranty" onchange="toggleWarrantyFields(); generatePreview();" checked />
          <label for="includeWarranty">הוסף סעיף אחריות להצעת המחיר</label>
        </div>

        <div id="warrantyFieldsContainer" class="warranty-fields active">
          <label>אחריות בעבור (טקסט חופשי):</label>
          <input type="text" id="warrantyFor" value="איטום העבודה" placeholder="למשל: איטום הגג, העבודה שבוצעה" />

          <label>משך האחריות</label>
          <select id="warrantyYears">
            <option value="שנה אחת">שנה אחת</option>
            <option value="שלוש שנות אחריות">שלוש שנות אחריות</option>
            <option value="חמש שנות אחריות">חמש שנות אחריות</option>
            <option value="שבע שנות אחריות">שבע שנות אחריות</option>
            <option value="עשר שנות אחריות" selected>עשר שנות אחריות</option>
          </select>
        </div>

        <label style="margin-top: 14px;">משפט סיום / הערה חופשית (אופציונלי)</label>
        <textarea id="notes" placeholder="למשל: נשמח לענות לכל שאלה."></textarea>

        <button type="submit" class="btn-main">📥 שמירה כ-PDF / הדפסת הצעה נקייה</button>
      </form>
    </div>

    <div class="card preview-card">
      <h2 class="no-print" style="color:#64748b; font-size: 14px; margin-bottom: 12px;">תצוגה מקדימה רשמית (איך שזה יישמר ב-PDF)</h2>
      <div class="preview-paper" id="preview"></div>
    </div>
  </div>

  <script>
    let currentCategory = 'roof';

    const bankItems = {
      roof: [
        'בטרם תחילת עבודות האיטום יש לבצע ניקיון יסודי של שטח הגג.',
        'פירוק כל היריעות הנפוחות סביב היקף הגג ופינוי הפסולת לאתר מורשה.',
        'פירוק כל היריעות הנפוחות סביב היקף הגג ופינוי הפסולת למכולה.',
        'הרמת הדודים והקולטים ליצירת שטח תקני לביצוע עבודות האיטום.',
        'שטיפת הגג בלחץ מים לקבלת תשתית טובה לביצוע עבודות האיטום.',
        'במידה ויש צנרת חודרת לגג יבוצעו קוביות בטון סביב הצנרת ליצירת שטח תקני לביצוע עבודות האיטום.',
        'בסיום העבודה תבוצע בדיקת הצפה בת 72 שעות המאשרת את תקינות האיטום והעבודה.',
        'ראשית יש לפנות את החצץ מהגג למכולה ע״י מנוף ופינוי הפסולת לאתר מורשה.',
        'יש לגלף ולפנות את הקלקר סביב הגג.',
        'יישום רנדופן, רשת יציקה ובטקל בכל שטח הגג.',
        'במידה ולא יבוצע בטקל יש להוציא את היריעות הקיימות על מנת לקבל שטח תקין לביצוע איטום.',
        'יש לבצע בדיקה לזרימה תקנית של המים למרזבים ושהמרזבים אינם פגועים.'
      ],
      balcony: [
        'בטרם תחילת עבודות האיטום יש לבצע ניקיון יסודי של השטח.',
        'פירוק כל היריעות הנפוחות סביב היקף השטח ופינוי הפסולת לאתר מורשה.',
        'פירוק כל היריעות הנפוחות סביב היקף השטח ופינוי הפסולת למכולה.',
        'בטרם תחילת העבודות יש לבצע פירוק של כל המרצפות וחומרי הריצוף במרפסת, לנקות את השטח מהפסולת ולפנות את כל הפסולת למכולה/לאתר מורשה.',
        'שטיפת השטח בלחץ מים לקבלת תשתית טובה לביצוע עבודות האיטום.',
        'תיקוני גלאנס (בטון) במקומות הנדרשים - כלומר לאחר גילוי תשתית הבטון בשטח יש לוודא כי השטח חלק מכל שיפוע על מנת לקבל תשתית חלקה ותקנית לריתוך היריעות.'
      ],
      wall: [
        'שטיפת הקיר בלחץ מים להכנת תשתית תקנית לביצוע עבודות האיטום.',
        'פתיחת הכוחלה וניקיון כללי של השטח להכנת הקיר לכיחול חדש.',
        'התזה של חומר איטום מסוג סילר של חברת ננו, זהו חומר המונע ספיגת המים לאבן.'
      ],
      materials: [
        'מריחת זפת חמה של חברת ביטום מסוג - 25/75.',
        'מריחת פריימר תקני 101 של חברת ביטום כחומר מקשר בין רצפת הגג לשכבת האיטום החדש, בעל תו תקן ישראלי והמתנה לייבוש תקני.',
        'אספקה והלחמת יריעות ביטומניות מסוג - APP שכבה בעובי 5 מ״מ עם אגרגרת, בעלות תו תקן של חברת ביטום. היריעות ירותכו בחפיפה של 10 ס״מ com עליה של 30 ס״מ סביב היקף השטח.',
        'אספקה והלחמת יריעות ביטומניות מסוג - SBS שכבה בעובי 5 מ״מ. היריעות ירותכו בשתי שכבות, בעלות תו תקן של חברת ביטום. היריעות ירותכו בחפיפה של 10 ס״מ עם עליה של 30 ס״מ סביב היקף השטח.',
        'אספקה והלחמת יריעות ביטומניות מסוג - SBS שכבה בעובי 4 מ״מ, בעלות תו תקן של חברת ביטום. היריעות ירותכו בחפיפה של 10 ס״מ עם עליה של 30 ס״מ סביב היקף הגג.',
        'מריחת חומר מסוג - ST של חברת דבטק, זהו חומר על בסיס סיליקוני תוצרת גרמניה העמיד למים עומדים ולקרני ה-UV של השמש. המריחה תתבצע ב-2 שכבות לקבלת שכבת איטום תקנית.',
        'מריחת חומר מסוג PB - זהו חומר ביטומני פוליאוריטני העמיד למים עומדים. השטח יימרח ב-2 שכבות, שכבה ראשונה וייבוש תקני ולאחר מכן שכבה שנייה.',
        'בסיום עבודת הריתוך, יבוצע מריחת חומר איטום מסוג - מסטיק 244 של חברת ביטום, לשמירת התנתקות היריעה באזורים הרגישים לאורך זמן.'
      ],
      general: [
        'בטרם תחילת העבודות יש לבצע ניקיון יסודי של השטח.',
        'פינוי הפסולת לאתר מורשה.',
        'פינוי הפסולת למכולה.'
      ]
    };

    let selectedItems = [];

    function renderBank() {
      Object.keys(bankItems).forEach(category => {
        const bankElement = document.getElementById(category);
        bankElement.innerHTML = bankItems[category].map((text, index) => `
          <div class="bank-item">
            <input type="checkbox" data-category="${category}" data-index="${index}">
            <span>${text}</span>
            <button type="button" class="btn-delete-bank" onclick="removeItemFromBank('${category}', ${index}, event)">❌</button>
          </div>
        `).join('');
      });
    }

    function showBank(id, button) {
      currentCategory = id;
      document.querySelectorAll('.section-bank').forEach(bank => bank.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      button.classList.add('active');
    }

    function addNewItemToBank() {
      const input = document.getElementById('customBankText');
      const text = input.value.trim();
      if (!text) return;

      bankItems[currentCategory].push(text);
      input.value = '';
      renderBank();
    }

    function removeItemFromBank(category, index, event) {
      event.preventDefault();
      event.stopPropagation();
      bankItems[category].splice(index, 1);
      renderBank();
    }

    function addCheckedBankItems() {
      const activeBank = document.querySelector('.section-bank.active');
      const checkedItems = activeBank.querySelectorAll('input[type="checkbox"]:checked');

      checkedItems.forEach(input => {
        const category = input.dataset.category;
        const index = Number(input.dataset.index);
        selectedItems.push({ type: 'item', text: bankItems[category][index] });
        input.checked = false;
      });

      renderSelectedItems();
      generatePreview();
    }

    function addNoteAfter(index) {
      const note = prompt('כתוב הערה ממודגשת שתופיע בשורה נפרדת:');
      if (!note) return;
      selectedItems.splice(index + 1, 0, { type: 'note', text: note });
      renderSelectedItems();
      generatePreview();
    }

    function removeSelectedItem(index) {
      selectedItems.splice(index, 1);
      renderSelectedItems();
      generatePreview();
    }

    function moveItem(index, direction) {
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= selectedItems.length) return;
      const item = selectedItems.splice(index, 1)[0];
      selectedItems.splice(newIndex, 0, item);
      renderSelectedItems();
      generatePreview();
    }

    function renderSelectedItems() {
      const box = document.getElementById('selectedItems');
      if (selectedItems.length === 0) {
        box.innerHTML = '<div class="selected-item">עדיין לא בחרת סעיפים.</div>';
        return;
      }

      box.innerHTML = selectedItems.map((item, index) => `
        <div class="selected-item">
          <strong>${item.type === 'note' ? 'הערה מודגשת' : 'סעיף'}:</strong> ${item.text}
          <div class="selected-actions">
            <button type="button" class="btn-small" onclick="moveItem(${index}, -1)">⬆️ למעלה</button>
            <button type="button" class="btn-small" onclick="moveItem(${index}, 1)">⬇️ למטה</button>
            <button type="button" class="btn-note" onclick="addNoteAfter(${index})">🟨 הוסף הערה מתחת</button>
            <button type="button" class="btn-remove" onclick="removeSelectedItem(${index})">מחק</button>
          </div>
        </div>
      `).join('');
    }

    function addPriceItem() {
      const pricesContainer = document.getElementById('pricesContainer');
      const index = document.querySelectorAll('.price-item').length;
      const letters = ['א׳', 'ב׳', 'ג׳', 'ד׳', 'ה׳'];

      const div = document.createElement('div');
      div.className = 'price-item';
      div.innerHTML = `
        <label>נוסח מחיר מובנה</label>
        <select class="priceText" onchange="generatePreview()">
          <option value="המחיר בעבור המערכת לאיטום הגג">המחיר בעבור המערכת לאיטום הגג</option>
          <option value="המחיר בעבור העבודה הינו">המחיר בעבור העבודה הינו</option>
          <option value="המחיר בעבור סעיף ${letters[index] || ''}">המחיר בעבור סעיף ${letters[index] || ''}</option>
        </select>

        <label>סכום בשקלים (מספר בלבד)</label>
        <input type="number" class="amount" placeholder="למשל: 12321" oninput="generatePreview()">

        <label>או נוסח תמחור חופשי משלך</label>
        <input type="text" class="customPriceText" placeholder="למשל: בעבור סעיף ז' למפרט" oninput="generatePreview()">

        <button type="button" class="btn-remove" style="margin-top:10px;" onclick="this.parentElement.remove(); generatePreview();">מחק שורת מחיר זו</button>
      `;

      pricesContainer.appendChild(div);
      generatePreview();
    }

    function getPrices() {
      return Array.from(document.querySelectorAll('.price-item')).map(item => {
        return {
          priceText: item.querySelector('.priceText').value,
          amount: item.querySelector('.amount').value,
          customPriceText: item.querySelector('.customPriceText').value.trim()
        };
      }).filter(item => item.amount || item.customPriceText);
    }

    function formatPricesHtml() {
      const prices = getPrices();
      if (prices.length === 0) return '<div>טרם הוגדרו עלויות.</div>';

      return prices.map(item => {
        const finalPriceText = item.customPriceText ? item.customPriceText : item.priceText;
        const formattedMoney = item.amount ? `${Number(item.amount).toLocaleString()} ₪` : '';
        return `<div class="price-line">❖ ${finalPriceText}${formattedMoney ? ' : ' + formattedMoney : ''}</div>`;
      }).join('');
    }

    function formatWorkItemsHtml() {
      const hebLetters = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז', 'ח', 'ט', 'י', 'כ', 'ל', 'מ', 'נ', 'ס', 'ע'];
      let letterIndex = 0;

      if (selectedItems.length === 0) return '<div>טרם נבחרו פעולות.</div>';

      return selectedItems.map(item => {
        if (item.type === 'note') {
          return `<div class="note-row">${item.text}</div>`;
        }
        const line = `<div class="item-row">${hebLetters[letterIndex]}. ${item.text}</div>`;
        letterIndex++;
        return line;
      }).join('');
    }

    function toggleWarrantyFields() {
      const isChecked = document.getElementById('includeWarranty').checked;
      const container = document.getElementById('warrantyFieldsContainer');
      if (isChecked) {
        container.classList.add('active');
      } else {
        container.classList.remove('active');
      }
    }

    function generatePreview() {
      const preview = document.getElementById('preview');

      const dateValue = document.getElementById('date').value;
      const hebrewDate = document.getElementById('hebrewDate').value;
      const customer = document.getElementById('customer').value || '________________';
      const address = document.getElementById('address').value || '________________';
      const subject = document.getElementById('subject').value || '';
      const openingText = document.getElementById('openingText').value || '';
      const workDescription = document.getElementById('workDescription').value || '';
      const vatText = document.getElementById('vatText').value;
      
      const includeWarranty = document.getElementById('includeWarranty').checked;
      const warrantyFor = document.getElementById('warrantyFor').value || 'איטום העבודה';
      const warrantyYears = document.getElementById('warrantyYears').value;
      
      const notes = document.getElementById('notes').value || '';

      let formattedDate = '';
      if (dateValue) {
        const parts = dateValue.split('-');
        if (parts.length === 3) {
          formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
      }

      let warrantyHtml = '';
      if (includeWarranty) {
        warrantyHtml = `
          <div class="section-title">להלן תוקף אחריות :</div>
          <div style="margin-bottom: 15px;">
            <div>❖ אחריות בעבור ${warrantyFor} תינתן ${warrantyYears}.</div>
            <div>❖ האחריות היא רק על העבודה שבוצעה ע״י חברת י.שם-טוב.</div>
            <div class="certification-text">ברשותנו תעודת אוטם מורשה וניסיון של למעלה מ־20 שנה בתחום האיטום. כלל העבודות מבוצעות תוך הקפדה על סטנדרטים גבוהים, שימוש בחומרים איכותיים ומתן פתרונות מקצועיים ואמינים לאורך זמן.</div>
          </div>
        `;
      }

      preview.innerHTML = `
        <div class="doc-content">
          <div class="logo-box">
            <div class="logo-title">י. שם-טוב</div>
            <div class="logo-subtitle">טכנולוגיות איטום מתקדמות</div>
          </div>
          <div class="doc-divider"></div>

          <div class="customer-info-box">
            <div class="info-right">
              <div class="info-row">לכבוד: ${customer}</div>
              <div class="info-row">רחוב: ${address}</div>
              <div style="margin-top: 10px;">שלום רב,</div>
            </div>
            <div class="info-left">
              <div class="info-row">${formattedDate}</div>
              <div class="info-row">${hebrewDate}</div>
            </div>
          </div>

          <div class="doc-subject">הנדון : ${subject}</div>
          <div class="doc-text">${openingText}</div>

          <div style="margin-bottom: 15px;">
            <strong>תיאור העבודה והמקום :</strong> ${workDescription}
          </div>

          <div class="section-title">להלן מפרט הפעולות המתבקשות :</div>
          <div style="margin-bottom: 15px;">
            ${formatWorkItemsHtml()}
          </div>

          <div class="section-title">להלן המחירים:</div>
          <div style="margin-bottom: 15px;">
            ${formatPricesHtml()}
            ${vatText ? `<div style="margin-top: 6px;">${vatText}</div>` : ''}
          </div>

          ${warrantyHtml}

          ${notes ? `<div class="doc-text" style="margin-top: 15px;">${notes}</div>` : ''}

          <div class="closing-signature">
            <div>בברכה,</div>
            <div style="font-weight: bold; margin-top: 2px;">י.שם-טוב</div>
          </div>
        </div>

        <div class="footer-normal">
          <div class="footer-phones">טלפקס' 02-6411418, נייד- יובל 054-2359359</div>
          <div class="footer-email">y.shemtov.z@gmail.com</div>
        </div>
      `;
    }

    function bindLivePreview() {
      document.querySelectorAll('#quoteForm input, #quoteForm textarea, #quoteForm select').forEach(element => {
        element.addEventListener('input', generatePreview);
        element.addEventListener('change', generatePreview);
      });
    }

    renderBank();
    renderSelectedItems();
    addPriceItem();
    
    const today = new Date();
    const offset = today.getTimezoneOffset();
    const localToday = new Date(today.getTime() - (offset*60*1000));
    document.getElementById('date').value = localToday.toISOString().split('T')[0];
    
    bindLivePreview();
    generatePreview();
  </script>
</body>
</html>
